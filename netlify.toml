[build]
  publish = "Website"

# ── Clean URL Redirects ─────────────────────────────────────────────────────
# These allow URLs without .html to work (better for SEO and sharing)

[[redirects]]
  from = "/guides/law-firm-valuation"
  to = "/guides/law-firm-valuation.html"
  status = 301

[[redirects]]
  from = "/guides/earn-outs-equity-rollovers"
  to = "/guides/earn-outs-equity-rollovers.html"
  status = 301

[[redirects]]
  from = "/guides/selling-a-solo-firm"
  to = "/guides/selling-a-solo-firm.html"
  status = 301

[[redirects]]
  from = "/guides/how-long-does-it-take"
  to = "/guides/how-long-does-it-take.html"
  status = 301

[[redirects]]
  from = "/guides/who-buys-law-firms"
  to = "/guides/who-buys-law-firms.html"
  status = 301

[[redirects]]
  from = "/tools/valuation-calculator"
  to = "/tools/valuation-calculator.html"
  status = 301

# ── Catch-all 404 handler ───────────────────────────────────────────────────
# Sends any unrecognised URL back to the homepage gracefully

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
